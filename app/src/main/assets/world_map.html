<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>World Map Analytics</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            width: 100%;
            height: 100%;
            max-height: 100%;
        }
        path {
            fill: #1E293B;
            stroke: #0284C7;
            stroke-width: 0.7;
            transition: fill 0.25s ease, stroke 0.25s ease;
            cursor: pointer;
        }
        path.has-data {
            fill: #0284C7;
            stroke: #38BDF8;
        }
        path.high-data {
            fill: #38BDF8;
            stroke: #E0E7FF;
        }
        path:hover, path:active {
            fill: #6366F1 !important;
            stroke: #FFFFFF !important;
            stroke-width: 1.5;
        }
        .tooltip {
            position: absolute;
            background-color: rgba(15, 23, 42, 0.95);
            border: 1px solid #38BDF8;
            color: #FFFFFF;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            pointer-events: none;
            display: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
            z-index: 100;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="map-container">
        <div id="tooltip" class="tooltip">Select a country</div>
        <svg viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
            <g id="world-paths">
                <!-- North America -->
                <path id="CA" data-name="Canada" d="M 120,40 L 320,40 L 300,130 L 120,130 Z" />
                <path id="US" data-name="United States" d="M 130,135 L 300,135 L 300,230 L 130,230 Z" />
                <path id="MX" data-name="Mexico" d="M 150,235 L 240,235 L 220,310 L 170,290 Z" />

                <!-- South America -->
                <path id="BR" data-name="Brazil" d="M 290,270 L 390,270 L 360,390 L 290,340 Z" />
                <path id="AR" data-name="Argentina" d="M 290,395 L 340,395 L 320,480 L 290,480 Z" />

                <!-- Europe -->
                <path id="GB" data-name="United Kingdom" d="M 455,100 L 485,100 L 480,135 L 450,130 Z" />
                <path id="FR" data-name="France" d="M 460,140 L 495,140 L 490,185 L 455,180 Z" />
                <path id="DE" data-name="Germany" d="M 500,130 L 535,130 L 535,170 L 500,170 Z" />
                <path id="ES" data-name="Spain" d="M 435,175 L 470,175 L 465,215 L 430,210 Z" />
                <path id="IT" data-name="Italy" d="M 510,175 L 535,175 L 530,215 L 505,210 Z" />
                <path id="RU" data-name="Russia" d="M 570,70 L 910,70 L 920,190 L 570,190 Z" />

                <!-- Asia & Middle East -->
                <path id="IN" data-name="India" d="M 670,215 L 740,215 L 720,310 L 670,270 Z" />
                <path id="CN" data-name="China" d="M 710,160 L 850,160 L 830,250 L 710,230 Z" />
                <path id="JP" data-name="Japan" d="M 860,150 L 890,150 L 880,220 L 850,210 Z" />
                <path id="SG" data-name="Singapore" d="M 735,315 L 755,315 L 755,330 L 735,330 Z" />

                <!-- Africa -->
                <path id="EG" data-name="Egypt" d="M 520,220 L 570,220 L 565,260 L 515,260 Z" />
                <path id="ZA" data-name="South Africa" d="M 510,380 L 580,380 L 560,450 L 500,440 Z" />

                <!-- Oceania -->
                <path id="AU" data-name="Australia" d="M 780,330 L 920,330 L 900,440 L 770,410 Z" />
            </g>
        </svg>
    </div>

    <script>
        let currentData = {};
        const tooltip = document.getElementById('tooltip');
        const paths = document.querySelectorAll('path');

        window.updateMapData = function(jsonString) {
            try {
                currentData = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;
                renderMap();
            } catch (e) {
                console.error("Failed to parse map data JSON", e);
            }
        };

        function renderMap() {
            paths.forEach(p => {
                const id = p.getAttribute('id');
                const count = currentData[id] || 0;
                p.classList.remove('has-data', 'high-data');

                if (count > 5) {
                    p.classList.add('high-data');
                } else if (count > 0) {
                    p.classList.add('has-data');
                }
            });
        }

        paths.forEach(p => {
            p.addEventListener('click', (e) => {
                const id = p.getAttribute('id');
                const name = p.getAttribute('data-name') || id;
                const count = currentData[id] || 0;

                tooltip.innerText = name + ': ' + count + ' visitors';
                tooltip.style.display = 'block';

                const rect = document.getElementById('map-container').getBoundingClientRect();
                const x = e.clientX - rect.left - 50;
                const y = e.clientY - rect.top - 45;

                tooltip.style.left = Math.max(10, Math.min(x, rect.width - 150)) + 'px';
                tooltip.style.top = Math.max(10, Math.min(y, rect.height - 50)) + 'px';
            });
        });
    </script>
</body>
</html>
